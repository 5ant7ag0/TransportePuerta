{% extends "base.html" %}
{% block title %}Registro{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="auth-card">
        <div class="auth-header">
            <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo" class="auth-logo">
            <h1>Crear Cuenta</h1>
            <p>Únete a Puerta a Puerta</p>
        </div>
        <form method="POST" action="{{ url_for('registro') }}">
            <div class="form-group">
                <label for="nombre">Nombre Completo</label>
                <input type="text" id="nombre" name="nombre" required placeholder="Tu nombre completo">
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required placeholder="correo@ejemplo.com">
            </div>
            <div class="form-group">
                <label for="telefono">Teléfono</label>
                <input type="tel" id="telefono" name="telefono" placeholder="+593 99 999 9999">
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" required placeholder="Mínimo 6 caracteres" minlength="6">
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirmar Contraseña</label>
                <input type="password" id="confirm_password" name="confirm_password" required placeholder="Repite tu contraseña">
            </div>
            <button type="submit" class="btn btn-primary btn-full btn-lg">
                <i class="fas fa-user-plus"></i> Registrarse
            </button>
        </form>
        <div class="auth-footer">
            <p>¿Ya tienes cuenta? <a href="{{ url_for('login') }}">Inicia sesión</a></p>
        </div>
    </div>
</section>
{% endblock %}
